<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dragon Network</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Dragon Network</h1>
    <p class="subtitle">Willkommen auf der offiziellen Seite</p>

    <!-- STATUS -->
    <div class="card">
        <h2>📊 Server Status</h2>
        <p id="status">Lädt...</p>
        <p>Spieler: <span id="players">-</span></p>
    </div>

    <!-- IP -->
    <div class="card">
        <h2>🌐 Server IP</h2>

        <div class="ip-box">
            <span id="ipText">minecraft.shadowra.de</span>
            <button onclick="copyIP()">KOPIEREN</button>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <a class="button" href="discord.html">💬 Discord</a>
        <a class="button donate" href="https://donate.shadowra.de/Minecraft/" target="_blank">💖 Spenden</a>
    </div>

</div>

<script>
const serverIP = "minecraft.shadowra.de";

/* SERVER STATUS */
fetch(`https://api.mcsrvstat.us/2/${serverIP}`)
.then(res => res.json())
.then(data => {

    const status = document.getElementById("status");
    const players = document.getElementById("players");

    if (data.online) {
        status.innerHTML = "🟢 ONLINE";
        players.innerHTML = `${data.players?.online ?? 0} / ${data.players?.max ?? 0}`;
    } else {
        status.innerHTML = "🔴 OFFLINE";
        players.innerHTML = "0 / 0";
    }

})
.catch(() => {
    document.getElementById("status").innerHTML = "⚠ Fehler";
});

/* COPY IP */
function copyIP() {
    navigator.clipboard.writeText(document.getElementById("ipText").innerText);

    const btn = event.target;
    btn.innerText = "✔ KOPIERT";

    setTimeout(() => {
        btn.innerText = "KOPIEREN";
    }, 1500);
}
</script>

</body>
</html>
